name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.8.21)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-sdk:
    name: Publish @bradygaster/squad-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build squad-sdk
        run: npm -w packages/squad-sdk run build

      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-sdk/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✅ Package version matches: $PKG_VERSION"

      - name: Publish squad-sdk to npm
        run: npm -w packages/squad-sdk publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publication
        run: |
          echo "✅ @bradygaster/squad-sdk@${{ steps.version.outputs.version }} published to npm"
          npm view @bradygaster/squad-sdk@${{ steps.version.outputs.version }} version

  publish-cli:
    name: Publish @bradygaster/squad-cli
    needs: publish-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build squad-cli
        run: npm -w packages/squad-cli run build

      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-cli/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✅ Package version matches: $PKG_VERSION"

      - name: Publish squad-cli to npm
        run: npm -w packages/squad-cli publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publication
        run: |
          echo "✅ @bradygaster/squad-cli@${{ steps.version.outputs.version }} published to npm"
          npm view @bradygaster/squad-cli@${{ steps.version.outputs.version }} version
